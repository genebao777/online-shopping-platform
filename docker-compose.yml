version: '3.8'

services:
  flask_ai:
    build:
      context: ./flask_ai
      dockerfile: Dockerfile
    environment:
      - FLASK_ENV=production
    ports:
      - "5000:5000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - flask_ai
